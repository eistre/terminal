catalogMode: strict
cleanupUnusedCatalogs: true
shellEmulator: true
trustPolicy: no-downgrade
trustPolicyExclude:
  - chokidar@4.0.3
  - semver@6.3.1

injectWorkspacePackages: true
syncInjectedDepsAfterScripts:
  - build

packages:
  - apps/*
  - packages/*

