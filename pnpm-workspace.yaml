  '@azure/arm-containerinstance': ^9.1.0
  '@azure/communication-email': ^1.1.0
  '@azure/core-rest-pipeline': ^1.23.0
  '@azure/identity': ^4.13.1
  '@azure/keyvault-secrets': ^4.11.2
  '@iconify-json/flag': ^1.2.12
  '@iconify-json/lucide': ^1.2.105
  '@kubernetes/client-node': ^1.4.0
  '@nuxt/eslint': ^1.15.2
  '@nuxt/ui': ^4.7.1
  '@nuxtjs/i18n': ^10.3.0
  '@sindresorhus/slugify': ^3.0.0
  '@tiptap/y-tiptap': ^3.0.3
  '@tsconfig/node-ts': ^23.6.4
  '@tsconfig/node24': ^24.0.4
  '@types/lodash-es': ^4.17.12
  '@types/node': ^24.12.3
  '@types/nodemailer': ^8.0.0
  '@types/sortablejs': ^1.15.9
  '@types/ssh2': ^1.15.5
  '@types/sshpk': ^1.17.4
  '@vueuse/nuxt': ^14.3.0
  '@xterm/addon-fit': ^0.11.0
  '@xterm/addon-webgl': ^0.19.0
  '@xterm/xterm': ^6.0.0
  better-auth: ^1.6.9
  drizzle-kit: ^0.31.10
  drizzle-orm: ^0.45.2
  eslint: ^9.39.4
  eslint-plugin-turbo: ^2.9.10
  husky: ^9.1.7
  lodash-es: ^4.18.1
  mysql2: ^3.22.3
  nodemailer: ^8.0.7
  nuxt: ^4.4.4
  p-limit: ^7.3.0
