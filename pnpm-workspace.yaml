  vue: ^3.5.34
  vue-router: ^5.0.6
  vue-tsc: ^3.2.8
  zod: ^4.4.3

allowBuilds:
  '@parcel/watcher': true
  '@prisma/engines': false
  cpu-features: true
  esbuild: true
  prisma: false
  ssh2: true
  unrs-resolver: true
